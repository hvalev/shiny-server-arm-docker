name: ci
on:
  push:
    paths-ignore:
      - 'README.md'
    branches:
      - '**'
  pull_request:
    paths-ignore:
      - 'README.md'
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buildx:
    runs-on: self-hosted
    timeout-minutes: 4320
    # runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Version
        id: get_version
        uses: dhkatz/get-version-action@v3.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Prepare local cache directory
        run: mkdir -p /tmp/runner/docker-cache

      - name: Build shiny
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          target: shiny
          cache-from: type=local,src=/tmp/runner/docker-cache
          cache-to: type=local,dest=/tmp/runner/docker-cache,mode=max
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Build shiny with devtools
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          target: shiny-with-devtools
          cache-from: type=local,src=/tmp/runner/docker-cache
          cache-to: type=local,dest=/tmp/runner/docker-cache,mode=max
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Build and load image for testing
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          target: shiny
          tags: hvalev/shiny-server-arm:latest
          cache-from: type=local,src=/tmp/runner/docker-cache

      - name: Smoke Test
        run: |
          # Start container in background (runs on host due to DooD)
          docker run -d --name shiny-test hvalev/shiny-server-arm:latest
          
          # Wait for container to start and get its IP
          sleep 5
          CONTAINER_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' shiny-test)
          echo "Container IP: $CONTAINER_IP"
          
          # Wait for Shiny server to be ready (max 60 seconds)
          for i in {1..30}; do
            if curl -s "http://$CONTAINER_IP:3838" > /dev/null 2>&1; then
              echo "✅ Shiny server is up!"
              break
            fi
            echo "Waiting for Shiny server... ($i/30)"
            sleep 2
          done
          
          # Test the hello app
          curl -f "http://$CONTAINER_IP:3838/hello/" || exit 1
          echo "✅ Smoke test passed!"
          
          # Cleanup
          docker stop shiny-test
          docker rm shiny-test
